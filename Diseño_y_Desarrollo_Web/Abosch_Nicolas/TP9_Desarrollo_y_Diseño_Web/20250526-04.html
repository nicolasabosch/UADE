<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio03</title>
    <script>
    
        const numero = prompt("Ingrese un número del 1 al 7:");
        
        // Crear un párrafo para mostrar el resultado
        const parrafo = document.createElement('p');
        document.body.appendChild(parrafo);
        
        // Convertir a número entero
        const dia = parseInt(numero);
        
        // Usar switch para determinar el día
        switch (dia) {
            case 1:
                parrafo.textContent = "Lunes";
                break;
            case 2:
                parrafo.textContent = "Martes";
                break;
            case 3:
                parrafo.textContent = "Miércoles";
                break;
            case 4:
                parrafo.textContent = "Jueves";
                break;
            case 5:
                parrafo.textContent = "Viernes";
                break;
            case 6:
                parrafo.textContent = "Sábado";
                break;
            case 7:
                parrafo.textContent = "Domingo";
                break;
            default:
                parrafo.textContent = "Número inválido. Debe ser un número del 1 al 7.";
        };

    </script>
</head>

<body>

</body>

</html>
