<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio05</title>
</head>
<script>
    window.onload = function() {
        let pares = 0;
        let impares = 0;
        let sumaPares = 0;
        let sumaImpares = 0;
        
        // Solicitar 10 números al usuario
        for (let i = 0; i < 10; i++) {
            let numero = parseInt(prompt("Ingrese un numero del 1 al 10:"));

            // Verificar si es par o impar
            if (numero % 2 === 0) {
                pares++;
                sumaPares += numero;
            } else {
                impares++;
                sumaImpares += numero;
            }
        }
        
        // Mostrar resultados
        let mensaje = `Números pares: ${pares}\n`;
        mensaje += `Números impares: ${impares}\n`;
        mensaje += `Suma de pares: ${sumaPares}\n`;
        mensaje += `Suma de impares: ${sumaImpares}\n`;
        
        // Determinar qué grupo tuvo la suma más alta
        if (sumaPares > sumaImpares) {
            mensaje += "Los números pares tuvieron la suma más alta";
        } else if (sumaImpares > sumaPares) {
            mensaje += "Los números impares tuvieron la suma más alta";
        } else {
            mensaje += "Ambos grupos tuvieron la misma suma";
        }
        
        alert(mensaje);
    };
</script>
<body>
    
</body>
</html>
