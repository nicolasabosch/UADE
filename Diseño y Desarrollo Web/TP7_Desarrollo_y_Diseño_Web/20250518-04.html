<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <header class="col-12">Header</header>
            <div class="col-12 col-sm-6 col-md-4 col1 text-sm-start">1</div>
            <div class="col-12 col-sm-6 col-md-4 col2 text-sm-end">2</div>
            <div class="col-12 col-sm-12 col-md-4 col3">3</div>
            <footer class="col-12 col-md-6 text-md-end text-center">Footer 1</footer>
            <footer class="col-12 col-md-6 text-md-start text-center">Footer 2</footer>
        </div>
    </div>


    <style>
        footer {
            background-color: yellow;
            padding: 10px;

        }



        @media screen and (min-width: 992px) {
            footer {
                border: 2px solid gray;
            }

            .col1,
            .col2,
            .col3 {
                background-color: red;
                padding: 10px;
                height: 500px;
                text-align: center;
                font-size: 50px;
                border: 2px solid gray;


            }

            header {
                background-color: chartreuse;
                padding: 10px;
                border: 2px solid grey;
            }
        }

        @media (min-width: 576px) and (max-width: 767px) {
            footer {
                border: 2px solid gray;
            }



            .col1,
            .col2 {
                background-color: red;
                padding: 10px;
                height: 500px;
                text-align: center;
                font-size: 50px;
                border: 2px solid gray;

            }

            .col3 {
                background-color: chartreuse;
                padding: 10px;
                height: 500px;
                text-align: center;
                font-size: 50px;
                border: 2px solid gray;

            }

            header {
                background-color: aqua;
                padding: 10px;
                border: 2px solid grey;
            }

        }
    </style>

</body>

</html>
